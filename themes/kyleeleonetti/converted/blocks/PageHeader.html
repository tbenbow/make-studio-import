<section class="pt-20 pb-10 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10 flex flex-col items-center gap-4">
    <h1 class="heading-xl text-fg text-center">{{title}}</h1>
    <div class="w-20 h-px bg-gradient-to-r from-brand/20 via-brand/60 to-brand/20"></div>
    {{#if subtitle}}
      <p class="body-lg text-fg-muted text-center max-w-2xl mt-2">{{subtitle}}</p>
    {{/if}}
  </div>
</section>
