<section class="pt-20 pb-8 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-3xl lg:px-10 flex flex-col items-center text-center gap-4">
    {{#if category}}
      <span class="heading-xs text-brand">{{category}}</span>
    {{/if}}
    <h1 class="heading-xl text-fg">{{title}}</h1>
    <div class="flex items-center gap-4 text-fg-alt">
      {{#if author}}
        <span class="body-sm">By {{author}}</span>
      {{/if}}
      {{#if date}}
        <span class="body-sm">{{date}}</span>
      {{/if}}
    </div>
    <div class="w-16 h-px bg-gradient-to-r from-brand/20 via-brand/60 to-brand/20 mt-4"></div>
  </div>
</section>
