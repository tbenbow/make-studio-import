<section class="py-20 md:py-28 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10 flex flex-col items-center gap-8">
    <h1 class="heading-xl text-fg text-center">{{headline}}</h1>
    <p class="heading-md text-fg-muted text-center max-w-2xl">{{subheadline}}</p>
    <div class="w-24 h-px bg-gradient-to-r from-brand/20 via-brand/60 to-brand/20"></div>
    <div class="body-lg text-fg-muted max-w-xl text-center">
      {{{intro}}}
    </div>
    {{#if (length buttons)}}
      <div class="flex flex-wrap items-center justify-center gap-4 mt-2">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    {{/if}}
    {{#if image}}
      <div class="mt-8 w-full max-w-4xl">
        <img src="{{image}}" alt="{{default image_alt ''}}" class="w-full rounded-2xl object-cover" />
      </div>
    {{/if}}
  </div>
</section>
