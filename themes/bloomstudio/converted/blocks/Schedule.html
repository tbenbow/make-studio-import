<section id="schedule" class="py-20 lg:py-28 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-5xl lg:px-10">
    <div class="flex flex-col items-center gap-4 mb-16 text-center">
      {{#if eyebrow}}
        <p class="heading-xs uppercase tracking-widest text-accent">{{eyebrow}}</p>
      {{/if}}
      <h2 class="heading-lg text-fg max-w-2xl text-balance">{{headline}}</h2>
      <div class="body-md text-fg-muted max-w-lg">
        {{{subheadline}}}
      </div>
    </div>
    {{#if (length steps)}}
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 lg:gap-12 mb-14">
        {{#each steps}}
          <div class="flex flex-col items-center text-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center rounded-full border-2 border-brand text-brand heading-sm">
              {{number}}
            </div>
            <h3 class="heading-sm text-fg">{{title}}</h3>
            <p class="body-sm text-fg-muted">{{description}}</p>
          </div>
        {{/each}}
      </div>
    {{/if}}
    <div class="flex flex-col items-center gap-4">
      {{#if (length buttons)}}
        <div class="flex flex-wrap items-center justify-center gap-4">
          {{#each buttons}}
            {{> Button}}
          {{/each}}
        </div>
      {{/if}}
      {{#if note}}
        <p class="body-sm text-fg-alt">{{note}}</p>
      {{/if}}
    </div>
  </div>
</section>
