<section class="py-16 bg-base">
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-10">
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
      <div class="flex flex-col gap-2">
        <h2 class="heading-lg text-fg">{{headline}}</h2>
        <p class="body-lg text-fg-muted max-w-xl">{{subheadline}}</p>
      </div>
      {{#if (length buttons)}}
        <div class="flex gap-3">
          {{#each buttons}}
            {{> Button}}
          {{/each}}
        </div>
      {{/if}}
    </div>
    {{#if (length members)}}
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        {{#each members}}
          <div class="flex flex-col gap-4">
            <div class="aspect-square rounded-2xl overflow-hidden bg-base-muted">
              <img src="{{image}}" alt="{{name}}" class="w-full h-full object-cover" />
            </div>
            <div>
              <h3 class="heading-xs font-semibold text-fg">{{name}}</h3>
              <p class="body-md text-fg-muted">{{role}}</p>
            </div>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
