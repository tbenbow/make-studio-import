<section class="py-16 bg-base-muted">
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-12">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
      <div class="flex flex-col gap-4">
        <h2 class="heading-lg text-fg">{{headline}}</h2>
        <p class="body-lg text-fg-muted">{{{description}}}</p>
      </div>
      <div class="relative rounded-2xl overflow-hidden">
        <img src="{{default video-thumbnail 'https://placehold.co/1008x672/e2e8f0/64748b?text=Video'}}" alt="Video" class="w-full h-auto object-cover" />
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-16 h-16 rounded-full bg-brand flex items-center justify-center text-on-brand">
            {{icon "play-fill" size="32"}}
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2 body-sm text-fg-muted">
      <span class="font-medium">{{default offices-label 'Offices'}}</span>
    </div>
    {{#if (length cities)}}
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        {{#each cities}}
          <div class="rounded-xl bg-base p-6 text-center">
            <span class="heading-md text-fg">{{name}}</span>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
