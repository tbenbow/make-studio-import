<section class="py-16 bg-base">
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-10">
    {{#if eyebrow}}
      <p class="body-sm font-medium text-fg-muted uppercase tracking-wider">{{eyebrow}}</p>
    {{/if}}
    {{#if (length services)}}
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        {{#each services}}
          <div class="flex flex-col gap-3 p-6 rounded-2xl border border-border hover:border-brand/30 transition">
            <h3 class="heading-sm text-fg">{{title}}</h3>
            <p class="body-md text-fg-muted">{{description}}</p>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
