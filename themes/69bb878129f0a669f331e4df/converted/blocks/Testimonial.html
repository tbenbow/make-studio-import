<section class="py-16 bg-base">
  <div class="max-w-7xl mx-auto px-6">
    {{#if eyebrow}}
      <p class="body-sm font-medium text-fg-muted uppercase tracking-wider mb-8">{{eyebrow}}</p>
    {{/if}}
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div class="flex flex-col gap-6">
        <blockquote class="heading-sm text-fg text-pretty">
          {{{quote}}}
        </blockquote>
        <div>
          <p class="body-md font-semibold text-fg">{{name}}</p>
          <p class="body-md text-fg-muted">{{byline}}</p>
        </div>
      </div>
      <div class="rounded-2xl overflow-hidden">
        <img src="{{default image 'https://placehold.co/520x600/e2e8f0/64748b?text=Testimonial'}}" alt="{{name}}" class="w-full h-auto object-cover" />
      </div>
    </div>
  </div>
</section>
