<section class="py-16 bg-base">
  <div class="max-w-7xl mx-auto px-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div class="flex flex-col gap-8">
        <h2 class="heading-lg text-fg">{{headline}}</h2>
        <div class="flex items-center gap-4 border-t border-border pt-6">
          <div>
            <div class="heading-lg text-fg">{{stat-value}}</div>
            <p class="body-md text-fg-muted">{{stat-label}}</p>
          </div>
        </div>
      </div>
      <div class="relative">
        <img src="{{default image 'https://placehold.co/960x708/e2e8f0/64748b?text=Property'}}" alt="{{headline}}" class="w-full h-auto rounded-2xl object-cover" />
      </div>
    </div>
  </div>
</section>
