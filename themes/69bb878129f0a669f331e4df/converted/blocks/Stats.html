<section class="py-16 bg-base-muted">
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-10">
    {{#if eyebrow}}
      <p class="body-sm font-medium text-fg-muted uppercase tracking-wider">{{eyebrow}}</p>
    {{/if}}
    {{#if (length stats)}}
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        {{#each stats}}
          <div class="flex flex-col gap-3">
            <div class="heading-lg text-fg">{{value}}</div>
            <p class="body-md text-fg-muted">{{description}}</p>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
