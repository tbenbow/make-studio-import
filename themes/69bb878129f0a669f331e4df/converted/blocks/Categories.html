<section class="py-16 bg-base">
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-10">
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
      <div class="flex flex-col gap-2">
        <h2 class="heading-lg text-fg">{{headline}}</h2>
        <p class="body-lg text-fg-muted max-w-xl">{{subheadline}}</p>
      </div>
      {{#if (length buttons)}}
        <div class="flex gap-3">
          {{#each buttons}}
            {{> Button}}
          {{/each}}
        </div>
      {{/if}}
    </div>
    {{#if (length categories)}}
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        {{#each categories}}
          <a href="{{default link '#'}}" class="group relative h-64 rounded-2xl overflow-hidden">
            <img src="{{image}}" alt="{{name}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            <div class="absolute bottom-6 left-6">
              <h3 class="heading-sm text-on-brand">{{name}}</h3>
            </div>
          </a>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
