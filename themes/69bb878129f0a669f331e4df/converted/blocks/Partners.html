<section class="py-16 bg-base">
  <div class="max-w-7xl mx-auto px-6 flex flex-col gap-10">
    <div class="flex flex-col gap-4 max-w-2xl">
      <h2 class="heading-lg text-fg">{{headline}}</h2>
      <p class="body-lg text-fg-muted">{{{description}}}</p>
    </div>
    {{#if (length logos)}}
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-8 items-center">
        {{#each logos}}
          <div class="flex items-center justify-center p-4">
            <img src="{{image}}" alt="{{name}}" class="h-12 w-auto object-contain grayscale hover:grayscale-0 transition" />
          </div>
        {{/each}}
      </div>
    {{/if}}
    {{#if (length buttons)}}
      <div class="flex gap-3">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
