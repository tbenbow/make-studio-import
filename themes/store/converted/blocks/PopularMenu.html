<section class="py-16 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10">
    <p class="heading-xs text-brand text-center">{{eyebrow}}</p>
    <h2 class="heading-lg text-fg mt-2 text-center">{{headline}}</h2>
    <div class="mt-10 grid grid-cols-2 gap-10 lg:grid-cols-4 lg:gap-x-16">
      {{#each items}}
        <div class="text-center">
          <img src="{{image}}" alt="{{name}}" class="mx-auto h-[200px] w-[200px] object-contain">
          <h5 class="heading-sm text-fg mt-2 hover:text-brand transition">{{name}}</h5>
          <p class="heading-xs text-brand mt-1">{{price}}</p>
          <div class="mt-3 flex justify-center">
            {{> Button link=link label="Add to Cart" style="primary" size="sm"}}
          </div>
        </div>
      {{/each}}
    </div>
    {{#if (length buttons)}}
      <div class="mx-auto mt-10 flex justify-center gap-4 lg:mt-16">
        {{#each buttons}}
          {{> Button link=link label=label style=style size=size}}
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
