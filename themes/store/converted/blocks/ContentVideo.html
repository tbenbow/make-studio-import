<section class="py-16 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10">
    <div class="grid grid-cols-1 gap-y-6 lg:grid-cols-2 lg:gap-x-16">
      <div>
        <h2 class="heading-lg text-fg">{{headline}}</h2>
        <p class="body-md text-fg-muted mt-4">{{description}}</p>
      </div>
      <div class="h-52 rounded-[20px] lg:h-80 lg:rounded-[32px] overflow-hidden bg-fg">
        {{#if video}}
          <video src="{{video}}" autoplay="" controls="" loop="" muted="" class="h-full w-full object-cover"></video>
        {{/if}}
      </div>
    </div>
  </div>
</section>
