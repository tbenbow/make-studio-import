<section class="py-16 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10">
    <p class="heading-xs text-brand text-center">{{eyebrow}}</p>
    <h2 class="heading-lg text-fg mt-2 text-center">{{headline}}</h2>
    <div class="mt-10 grid grid-cols-1 gap-y-10 lg:mt-16 lg:grid-cols-3 lg:gap-x-6">
      {{#each posts}}
        <div>
          <div class="h-[250px] rounded-2xl bg-cover bg-center" style="background-image:url({{image}})"></div>
          <h6 class="heading-sm text-fg mt-6">{{title}}</h6>
          <a class="heading-xs mt-4 flex items-center space-x-2 text-brand hover:underline" href="{{link}}">
            <span>Read More</span>
            {{icon "caret-double-right" size="16"}}
          </a>
        </div>
      {{/each}}
    </div>
  </div>
</section>
