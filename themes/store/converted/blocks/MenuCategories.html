<section class="py-16 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-5xl lg:px-10">
    <p class="heading-xs text-brand text-center">{{eyebrow}}</p>
    <h2 class="heading-lg text-fg mt-2 text-center">{{headline}}</h2>
    <div class="grid grid-cols-1 gap-10 pt-10 lg:grid-cols-3">
      {{#each categories}}
        <a class="rounded-2xl border border-border px-16 py-5 text-center transition duration-300 hover:border-brand hover:shadow-lg" href="{{link}}">
          <img src="{{image}}" alt="{{name}}" class="mx-auto h-[130px] w-[130px] object-contain">
          <h5 class="heading-sm text-fg mt-2">{{name}}</h5>
          <p class="heading-xs text-brand mt-1">{{count}} Menu</p>
        </a>
      {{/each}}
    </div>
  </div>
</section>
