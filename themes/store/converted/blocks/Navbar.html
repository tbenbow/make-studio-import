<header class="sticky top-0 z-10 bg-base">
  <nav>
    <div class="mx-auto flex h-20 max-w-7xl items-center gap-4 px-6 lg:px-10">
      <div class="flex flex-1 items-center">
        <a href="/" class="inline-flex items-center gap-2">
          {{#if logo}}
            <img src="{{logo}}" alt="{{logo-text}}" class="h-8 w-auto">
          {{else}}
            <span class="heading-sm text-fg">{{logo-text}}</span>
          {{/if}}
        </a>
      </div>
      {{#if (length links)}}
        <div class="hidden lg:flex gap-8">
          {{#each links}}
            <a href="{{url}}" class="body-sm font-medium text-fg hover:text-brand transition">
              {{label}}
            </a>
          {{/each}}
        </div>
      {{/if}}
      <div class="flex flex-1 items-center justify-end gap-4">
        {{#if button-label}}
          {{> Button link=button-link label=button-label style="outline" size="sm"}}
        {{/if}}
        <button type="button" aria-label="Toggle menu" class="inline-flex rounded-full p-1.5 text-fg hover:bg-base-muted lg:hidden">
          {{icon "list" size="24"}}
        </button>
      </div>
    </div>
  </nav>
</header>
