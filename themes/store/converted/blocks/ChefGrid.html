<section class="py-16 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10">
    <p class="heading-md text-brand text-center">{{eyebrow}}</p>
    <h2 class="heading-lg text-fg mt-2 text-center">{{headline}}</h2>
    <div class="mt-8 grid grid-cols-1 gap-y-8 lg:mt-20 lg:grid-cols-3 lg:gap-x-16">
      {{#each members}}
        <div>
          <div class="group flex h-[415px] justify-center rounded-[32px] bg-base-muted overflow-hidden">
            <img src="{{image}}" alt="{{name}}" class="h-full w-fit object-cover origin-bottom transition duration-300 group-hover:scale-110">
          </div>
          <div class="mt-6 text-center">
            <h5 class="heading-sm text-fg">{{name}}</h5>
            <p class="heading-xs text-fg-muted mt-1">{{role}}</p>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
