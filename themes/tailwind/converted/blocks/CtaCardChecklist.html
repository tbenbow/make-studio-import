<section class="overflow-hidden bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl sm:px-6 lg:px-8">
    <div class="mx-auto flex max-w-2xl flex-col gap-16 bg-panel px-6 py-16 ring-1 ring-border sm:rounded-3xl sm:p-8 lg:mx-0 lg:max-w-none lg:flex-row lg:items-center lg:py-20 xl:gap-x-20 xl:px-20">
      {{#if image}}
        <img src="{{image}}" alt="{{image-alt}}" class="h-96 w-full flex-none rounded-2xl object-cover shadow-xl lg:aspect-square lg:h-auto lg:max-w-sm">
      {{/if}}
      <div class="w-full flex-auto">
        <h2 class="heading-lg text-fg text-pretty">{{headline}}</h2>
        {{#if subheadline}}
          <p class="mt-6 body-md text-fg-alt text-pretty">{{subheadline}}</p>
        {{/if}}
        {{#if (length items)}}
          <ul role="list" class="mt-10 grid grid-cols-1 gap-x-8 gap-y-3 body-md text-fg-muted sm:grid-cols-2">
            {{#each items}}
              <li class="flex gap-x-3">
                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="h-7 w-5 flex-none text-fg-muted">
                  <path d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" fill-rule="evenodd"></path>
                </svg>
                {{label}}
              </li>
            {{/each}}
          </ul>
        {{/if}}
        {{#if cta-label}}
          <div class="mt-10 flex">
            <a href="{{cta-link}}" class="body-sm font-semibold text-brand hover:opacity-80">
              {{cta-label}}
              <span aria-hidden="true">→</span>
            </a>
          </div>
        {{/if}}
      </div>
    </div>
  </div>
</section>
