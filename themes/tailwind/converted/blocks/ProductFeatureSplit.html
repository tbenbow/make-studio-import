<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto grid max-w-2xl grid-cols-1 items-center gap-x-8 gap-y-16 px-4 sm:px-6 lg:max-w-7xl lg:grid-cols-2 lg:px-8">
    <div>
      <h2 class="heading-lg text-fg">{{heading}}</h2>
      {{#if description}}
        <p class="mt-4 text-fg-muted">{{description}}</p>
      {{/if}}
      <dl class="mt-16 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 sm:gap-y-16 lg:gap-x-8">
        {{#each specs}}
          <div class="border-t border-border pt-4">
            <dt class="body-md font-medium text-fg">{{label}}</dt>
            <dd class="mt-2 body-sm text-fg-muted">{{value}}</dd>
          </div>
        {{/each}}
      </dl>
    </div>
    <div class="grid grid-cols-2 grid-rows-2 gap-4 sm:gap-6 lg:gap-8">
      {{#each images}}
        <img src="{{src}}" alt="{{alt}}" class="rounded-lg bg-base-muted">
      {{/each}}
    </div>
  </div>
</section>
