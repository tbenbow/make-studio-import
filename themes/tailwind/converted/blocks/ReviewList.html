<section class="bg-base">
  <div class="mx-auto max-w-2xl px-4 py-16 sm:px-6 sm:py-24 lg:max-w-7xl lg:px-8">
    <h2 class="body-lg font-medium text-fg">{{heading}}</h2>
    <div class="mt-6 divide-y divide-border border-t border-b border-border">
      {{#each reviews}}
        <div class="py-10 lg:grid lg:grid-cols-12 lg:gap-x-8">
          <div class="lg:col-span-8 lg:col-start-5 xl:col-span-9 xl:col-start-4 xl:grid xl:grid-cols-3 xl:items-start xl:gap-x-8">
            <div class="flex items-center xl:col-span-1">
              <div class="flex items-center gap-x-1 text-brand">
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
              </div>
              <p class="ml-3 body-sm text-fg-muted">{{rating}}</p>
            </div>
            <div class="mt-4 lg:mt-6 xl:col-span-2 xl:mt-0">
              <h3 class="body-sm font-medium text-fg">{{title}}</h3>
              <div class="mt-3 body-sm text-fg-muted">
                <p>{{body}}</p>
              </div>
            </div>
          </div>
          <div class="mt-6 flex items-center body-sm lg:col-span-4 lg:col-start-1 lg:row-start-1 lg:mt-0 lg:flex-col lg:items-start xl:col-span-3">
            <p class="font-medium text-fg">{{author}}</p>
            <time class="ml-4 border-l border-border pl-4 text-fg-muted lg:mt-2 lg:ml-0 lg:border-0 lg:pl-0">{{date}}</time>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
