<section class="bg-base py-16 sm:py-24">
  <div class="mx-auto max-w-xl px-6 lg:max-w-7xl lg:px-8">
    <h2 class="heading-sm text-fg">{{heading}}</h2>
    {{#if description}}
      <p class="mt-4 body-md text-fg-muted">{{description}}</p>
    {{/if}}
    <div class="mt-10 space-y-12 lg:grid lg:grid-cols-3 lg:space-y-0 lg:gap-x-8">
      {{#each collections}}
        <a href="{{link}}" class="group block">
          {{#if image}}
            <img src="{{image}}" alt="{{name}}" class="aspect-3/2 w-full rounded-lg object-cover group-hover:opacity-75 lg:aspect-5/6">
          {{/if}}
          <h3 class="mt-4 body-md font-semibold text-fg">{{name}}</h3>
          {{#if description}}
            <p class="mt-2 body-sm text-fg-muted">{{description}}</p>
          {{/if}}
        </a>
      {{/each}}
    </div>
  </div>
</section>
