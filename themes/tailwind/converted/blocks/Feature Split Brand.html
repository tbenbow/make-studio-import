<section class="overflow-hidden bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl md:px-6 lg:px-8">
    <div class="grid grid-cols-1 gap-x-8 gap-y-16 sm:gap-y-20 lg:grid-cols-2 lg:items-start">
      <div class="px-6 lg:px-0 lg:pt-4 lg:pr-4">
        <div class="mx-auto max-w-2xl lg:mx-0 lg:max-w-lg">
          {{#if eyebrow}}
            <h2 class="body-sm font-semibold text-brand">{{eyebrow}}</h2>
          {{/if}}
          <p class="mt-2 heading-lg text-fg">{{headline}}</p>
          {{#if description}}
            <p class="mt-6 body-md text-fg-alt">{{description}}</p>
          {{/if}}
          <dl class="mt-10 max-w-xl space-y-8 body-md text-fg-muted lg:max-w-none">
            {{#each features}}
              <div class="relative pl-9">
                <dt class="inline font-semibold text-fg">
                  {{#if icon}}
                    <div class="absolute top-1 left-1 size-5 text-brand">
                      {{icon icon size="20"}}
                    </div>
                  {{/if}}
                  {{title}}.
                </dt>
                <dd class="inline">{{description}}</dd>
              </div>
            {{/each}}
          </dl>
        </div>
      </div>
      {{#if screenshot}}
        <div class="sm:px-6 lg:px-0">
          <div class="relative isolate overflow-hidden bg-brand px-6 pt-8 sm:mx-auto sm:max-w-2xl sm:rounded-3xl sm:pt-16 sm:pr-0 sm:pl-16 lg:mx-0 lg:max-w-none">
            <div aria-hidden="true" class="absolute -inset-y-px -left-3 -z-10 w-full origin-bottom-left skew-x-[-30deg] bg-brand/20 opacity-20 ring-1 ring-on-brand ring-inset"></div>
            <div class="mx-auto max-w-2xl sm:mx-0 sm:max-w-none">
              <img src="{{screenshot}}" alt="Product screenshot" class="-mb-12 w-[57rem] max-w-none rounded-tl-xl bg-base ring-1 ring-fg/10">
            </div>
            <div aria-hidden="true" class="pointer-events-none absolute inset-0 ring-1 ring-fg/10 ring-inset sm:rounded-3xl"></div>
          </div>
        </div>
      {{/if}}
    </div>
  </div>
</section>
