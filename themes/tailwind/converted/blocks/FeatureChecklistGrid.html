<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto grid max-w-2xl grid-cols-1 gap-x-8 gap-y-16 sm:gap-y-20 lg:mx-0 lg:max-w-none lg:grid-cols-5">
      <div class="col-span-2">
        {{#if eyebrow}}
          <h2 class="body-sm font-semibold text-brand">{{eyebrow}}</h2>
        {{/if}}
        <p class="mt-2 heading-lg text-fg">{{headline}}</p>
        {{#if description}}
          <p class="mt-6 body-md text-fg-alt">{{description}}</p>
        {{/if}}
      </div>
      <dl class="col-span-3 grid grid-cols-1 gap-x-8 gap-y-10 body-md text-fg-muted sm:grid-cols-2 lg:gap-y-16">
        {{#each features}}
          <div class="relative pl-9">
            <dt class="font-semibold text-fg">
              {{#if icon}}
                <div class="absolute top-1 left-0 size-5 text-brand">
                  {{icon icon size="20"}}
                </div>
              {{/if}}
              {{title}}
            </dt>
            <dd class="mt-2">{{description}}</dd>
          </div>
        {{/each}}
      </dl>
    </div>
  </div>
</section>
