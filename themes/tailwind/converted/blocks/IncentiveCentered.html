<section class="bg-base-alt">
  <div class="mx-auto max-w-7xl py-24 sm:px-2 sm:py-32 lg:px-4">
    <div class="mx-auto grid max-w-2xl grid-cols-1 gap-x-8 gap-y-10 px-4 lg:max-w-none lg:grid-cols-3">
      {{#each perks}}
        <div class="text-center sm:flex sm:text-left lg:block lg:text-center">
          {{#if icon}}
            <div class="sm:shrink-0">
              <div class="flow-root">
                <div class="mx-auto h-24 w-28 text-brand">
                  {{icon icon size="96"}}
                </div>
              </div>
            </div>
          {{/if}}
          <div class="mt-3 sm:mt-0 sm:ml-3 lg:mt-3 lg:ml-0">
            <h3 class="body-sm font-medium text-fg">{{title}}</h3>
            <p class="mt-2 body-sm text-fg-muted">{{description}}</p>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
