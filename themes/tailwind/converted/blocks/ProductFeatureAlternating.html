<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-2xl px-4 sm:px-6 lg:max-w-7xl lg:px-8">
    <div class="mx-auto max-w-3xl text-center">
      <h2 class="heading-lg text-fg">{{heading}}</h2>
      {{#if description}}
        <p class="mt-4 text-fg-muted">{{description}}</p>
      {{/if}}
    </div>
    <div class="mt-16 space-y-16">
      {{#each features}}
        <div class="flex flex-col-reverse lg:grid lg:grid-cols-12 lg:items-center lg:gap-x-8">
          <div class="mt-6 lg:col-span-5 {{#if (isOdd @index)}}lg:col-start-8 lg:row-start-1{{else}}lg:col-start-1 lg:row-start-1{{/if}} lg:mt-0 xl:col-span-4 {{#if (isOdd @index)}}xl:col-start-9{{else}}xl:col-start-1{{/if}}">
            <h3 class="body-lg font-medium text-fg">{{title}}</h3>
            <p class="mt-2 body-sm text-fg-muted">{{description}}</p>
          </div>
          <div class="flex-auto lg:col-span-7 {{#if (isOdd @index)}}lg:col-start-1{{else}}lg:col-start-6{{/if}} lg:row-start-1 xl:col-span-8 {{#if (isOdd @index)}}xl:col-start-1{{else}}xl:col-start-5{{/if}}">
            {{#if image}}
              <img src="{{image}}" alt="{{title}}" class="aspect-5/2 w-full rounded-lg bg-base-muted object-cover">
            {{/if}}
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
