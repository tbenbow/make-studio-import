<section class="relative isolate overflow-hidden bg-base py-24 sm:py-32 {{#if (eq alignment 'centered')}}px-6 lg:px-8{{/if}}">
  <img src="{{background-image}}" alt="" class="absolute inset-0 -z-10 size-full object-cover">
  <div class="{{#if (eq alignment 'centered')}}mx-auto max-w-2xl text-center{{else}}mx-auto max-w-7xl px-6 lg:px-8{{/if}}">
    {{#unless (eq alignment 'centered')}}
      <div class="mx-auto max-w-2xl lg:mx-0">
    {{/unless}}
    <h2 class="heading-xl text-fg">{{heading}}</h2>
    {{#if description}}
      <p class="mt-8 body-lg font-medium text-pretty text-fg-muted">{{description}}</p>
    {{/if}}
    {{#unless (eq alignment 'centered')}}
      </div>
    {{/unless}}
  </div>
</section>
