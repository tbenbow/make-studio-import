<div x-data="{ show: true }" x-show="show">
  <div class="pointer-events-none fixed inset-x-0 bottom-0 sm:flex sm:justify-center sm:px-6 sm:pb-5 lg:px-8 z-50">
    <div class="pointer-events-auto flex items-center justify-between gap-x-6 bg-base-alt px-6 py-2.5 border border-border sm:rounded-xl sm:py-3 sm:pr-3.5 sm:pl-4">
      <p class="body-sm text-fg">
        <a href="{{url}}">
          {{#if label}}<strong class="font-semibold">{{label}}</strong><svg viewBox="0 0 2 2" aria-hidden="true" class="mx-2 inline size-0.5 fill-current"><circle r="1" cx="1" cy="1"></circle></svg>{{/if}}{{message}}&nbsp;<span aria-hidden="true">→</span>
        </a>
      </p>
      <button type="button" @click="show = false" class="-m-1.5 flex-none p-1.5">
        <span class="sr-only">Dismiss</span>
        <span class="size-5 text-fg">{{icon "x" size="20"}}</span>
      </button>
    </div>
  </div>
</div>
