<section class="bg-base">
  <div class="mx-auto max-w-2xl px-4 py-16 sm:px-6 sm:py-24">
    <div class="space-y-10">
      {{#each reviews}}
        <div class="flex flex-col sm:flex-row">
          <div class="order-2 mt-6 sm:mt-0 sm:ml-16">
            <h3 class="body-sm font-medium text-fg">{{title}}</h3>
            <div class="mt-3 body-sm text-fg-muted">
              <p>{{body}}</p>
            </div>
          </div>
          <div class="order-1 flex items-center sm:flex-col sm:items-start">
            {{#if avatar}}
              <img src="{{avatar}}" alt="{{author}}" class="size-12 rounded-full">
            {{/if}}
            <div class="ml-4 sm:mt-4 sm:ml-0">
              <p class="body-sm font-medium text-fg">{{author}}</p>
              <div class="mt-2 flex items-center gap-x-1 text-fg">
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
                {{icon "star-fill" size="20"}}
              </div>
            </div>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
