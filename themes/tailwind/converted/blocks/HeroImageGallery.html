<section class="bg-base">
  <div class="relative isolate">
    <div class="overflow-hidden">
      <div class="mx-auto max-w-7xl px-6 pb-32 pt-36 sm:pt-60 lg:px-8 lg:pt-32">
        <div class="mx-auto max-w-2xl gap-x-14 lg:mx-0 lg:flex lg:max-w-none lg:items-center">
          <div class="relative w-full lg:max-w-xl lg:shrink-0 xl:max-w-2xl">
            <h1 class="text-pretty heading-xl text-fg">{{headline}}</h1>
            {{#if subheadline}}
              <p class="mt-8 text-pretty body-lg text-fg-alt sm:max-w-md lg:max-w-none">{{subheadline}}</p>
            {{/if}}
            <div class="mt-10 flex items-center gap-4">
              {{#each buttons}}
                {{> Button}}
              {{/each}}
            </div>
          </div>
          <div class="mt-14 flex justify-end gap-8 sm:-mt-44 sm:justify-start sm:pl-20 lg:mt-0 lg:pl-0">
            {{#each gallery}}
              {{#if (eq @index 0)}}
                <div class="ml-auto w-44 flex-none space-y-8 pt-32 sm:ml-0 sm:pt-80 lg:order-last lg:pt-36 xl:order-none xl:pt-80">
                  <div class="relative">
                    <img src="{{image}}" alt="" class="aspect-[2/3] w-full rounded-xl bg-fg/5 object-cover shadow-lg">
                    <div class="pointer-events-none absolute inset-0 rounded-xl ring-1 ring-inset ring-fg/10"></div>
                  </div>
                </div>
              {{/if}}
              {{#if (eq @index 1)}}
                <div class="mr-auto w-44 flex-none space-y-8 sm:mr-0 sm:pt-52 lg:pt-36">
                  <div class="relative">
                    <img src="{{image}}" alt="" class="aspect-[2/3] w-full rounded-xl bg-fg/5 object-cover shadow-lg">
                    <div class="pointer-events-none absolute inset-0 rounded-xl ring-1 ring-inset ring-fg/10"></div>
                  </div>
              {{/if}}
              {{#if (eq @index 2)}}
                  <div class="relative">
                    <img src="{{image}}" alt="" class="aspect-[2/3] w-full rounded-xl bg-fg/5 object-cover shadow-lg">
                    <div class="pointer-events-none absolute inset-0 rounded-xl ring-1 ring-inset ring-fg/10"></div>
                  </div>
                </div>
              {{/if}}
              {{#if (eq @index 3)}}
                <div class="w-44 flex-none space-y-8 pt-32 sm:pt-0">
                  <div class="relative">
                    <img src="{{image}}" alt="" class="aspect-[2/3] w-full rounded-xl bg-fg/5 object-cover shadow-lg">
                    <div class="pointer-events-none absolute inset-0 rounded-xl ring-1 ring-inset ring-fg/10"></div>
                  </div>
              {{/if}}
              {{#if (eq @index 4)}}
                  <div class="relative">
                    <img src="{{image}}" alt="" class="aspect-[2/3] w-full rounded-xl bg-fg/5 object-cover shadow-lg">
                    <div class="pointer-events-none absolute inset-0 rounded-xl ring-1 ring-inset ring-fg/10"></div>
                  </div>
                </div>
              {{/if}}
            {{/each}}
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
