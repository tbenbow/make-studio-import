<section class="relative bg-base">
  {{#if image}}
    <div class="relative h-80 overflow-hidden bg-brand md:absolute md:left-0 md:h-full md:w-1/3 lg:w-1/2">
      <img src="{{image}}" alt="{{image-alt}}" class="size-full object-cover">
    </div>
  {{/if}}
  <div class="relative mx-auto max-w-7xl py-24 sm:py-32 lg:px-8 lg:py-40">
    <div class="pr-6 pl-6 md:ml-auto md:w-2/3 md:pl-16 lg:w-1/2 lg:pr-0 lg:pl-24 xl:pl-32">
      {{#if eyebrow}}
        <p class="body-sm font-semibold text-brand">{{eyebrow}}</p>
      {{/if}}
      <h2 class="mt-2 heading-lg text-fg">{{headline}}</h2>
      {{#if subheadline}}
        <p class="mt-6 body-md text-fg-muted">{{subheadline}}</p>
      {{/if}}
      <div class="mt-8 flex items-center gap-4">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    </div>
  </div>
</section>
