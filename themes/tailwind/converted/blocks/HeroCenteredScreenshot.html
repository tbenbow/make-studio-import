<section class="bg-base">
  <div class="relative isolate pt-14">
    <div class="py-24 sm:py-32 lg:pb-40">
      <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <div class="mx-auto max-w-2xl text-center">
          <h1 class="text-balance heading-xl text-fg">{{headline}}</h1>
          {{#if subheadline}}
            <p class="mt-8 text-pretty body-lg text-fg-alt">{{subheadline}}</p>
          {{/if}}
          <div class="mt-10 flex items-center justify-center gap-4">
            {{#each buttons}}
              {{> Button}}
            {{/each}}
          </div>
        </div>
        {{#if screenshot}}
          <div class="mt-16 flow-root sm:mt-24">
            <div class="-m-2 rounded-xl bg-fg/[0.025] p-2 ring-1 ring-inset ring-fg/10 lg:-m-4 lg:rounded-2xl lg:p-4">
              <img src="{{screenshot}}" alt="{{screenshot-alt}}" class="w-full rounded-md bg-fg/5 shadow-2xl ring-1 ring-fg/10">
            </div>
          </div>
        {{/if}}
      </div>
    </div>
  </div>
</section>
