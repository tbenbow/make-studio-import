<section class="bg-base py-16 sm:py-24">
  <div class="mx-auto max-w-2xl px-6 lg:max-w-7xl">
    <div class="relative overflow-hidden rounded-lg lg:h-96">
      {{#if image}}
        <div class="absolute inset-0">
          <img src="{{image}}" alt="" class="size-full object-cover">
        </div>
      {{/if}}
      <div aria-hidden="true" class="relative h-96 w-full lg:hidden"></div>
      <div aria-hidden="true" class="relative h-32 w-full lg:hidden"></div>
      <div class="absolute inset-x-0 bottom-0 rounded-br-lg rounded-bl-lg bg-black/75 p-6 backdrop-blur-sm backdrop-filter sm:flex sm:items-center sm:justify-between lg:inset-x-auto lg:inset-y-0 lg:w-96 lg:flex-col lg:items-start lg:rounded-tl-lg lg:rounded-br-none">
        <div>
          <h2 class="heading-xs font-bold text-white">{{heading}}</h2>
          {{#if description}}
            <p class="mt-1 body-sm text-gray-300">{{description}}</p>
          {{/if}}
        </div>
        {{#if button-text}}
          <a href="{{button-url}}" class="mt-6 flex shrink-0 items-center justify-center rounded-md border border-white/25 px-4 py-3 body-md font-medium text-white hover:bg-white/10 sm:mt-0 sm:ml-8 lg:ml-0 lg:w-full">{{button-text}}</a>
        {{/if}}
      </div>
    </div>
  </div>
</section>
