<div x-data="{ show: true }" x-show="show">
  <div class="relative flex items-center gap-x-6 bg-brand px-6 py-2.5 sm:px-3.5 sm:before:flex-1">
    <p class="body-sm text-on-brand">
      <a href="{{url}}">
        {{#if label}}<strong class="font-semibold">{{label}}</strong><svg viewBox="0 0 2 2" aria-hidden="true" class="mx-2 inline size-0.5 fill-current"><circle r="1" cx="1" cy="1"></circle></svg>{{/if}}{{message}}&nbsp;<span aria-hidden="true">→</span>
      </a>
    </p>
    <div class="flex flex-1 justify-end">
      <button type="button" @click="show = false" class="-m-3 p-3">
        <span class="sr-only">Dismiss</span>
        <span class="size-5 text-on-brand">{{icon "x" size="20"}}</span>
      </button>
    </div>
  </div>
</div>
