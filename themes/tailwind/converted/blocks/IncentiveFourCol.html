<section class="bg-base-alt">
  <div class="mx-auto max-w-2xl px-4 py-24 sm:px-6 sm:py-32 lg:max-w-7xl lg:px-8">
    <div class="grid grid-cols-1 gap-y-12 sm:grid-cols-2 sm:gap-x-6 lg:grid-cols-4 lg:gap-x-8">
      {{#each perks}}
        <div>
          {{#if icon}}
            <div class="h-24 w-auto text-brand">
              {{icon icon size="96"}}
            </div>
          {{/if}}
          <h3 class="mt-6 body-sm font-medium text-fg">{{title}}</h3>
          <p class="mt-2 body-sm text-fg-muted">{{description}}</p>
        </div>
      {{/each}}
    </div>
  </div>
</section>
