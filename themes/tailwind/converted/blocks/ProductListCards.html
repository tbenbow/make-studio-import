<section class="bg-base py-16 sm:py-24">
  <div class="mx-auto max-w-2xl px-6 lg:max-w-7xl lg:px-8">
    {{#if heading}}
      <h2 class="sr-only">{{heading}}</h2>
    {{/if}}
    <div class="grid grid-cols-1 gap-y-4 sm:grid-cols-2 sm:gap-x-6 sm:gap-y-10 lg:grid-cols-3 lg:gap-x-8">
      {{#each products}}
        <div class="group relative flex flex-col overflow-hidden rounded-lg border border-border bg-base">
          {{#if image}}
            <img src="{{image}}" alt="{{name}}" class="aspect-3/4 w-full bg-base-muted object-cover group-hover:opacity-75 sm:aspect-auto sm:h-96">
          {{/if}}
          <div class="flex flex-1 flex-col space-y-2 p-4">
            <h3 class="body-sm font-medium text-fg">
              <a href="{{link}}">
                <span aria-hidden="true" class="absolute inset-0"></span>
                {{name}}
              </a>
            </h3>
            {{#if description}}
              <p class="body-sm text-fg-muted">{{description}}</p>
            {{/if}}
            <div class="flex flex-1 flex-col justify-end">
              {{#if variant}}
                <p class="body-sm text-fg-muted italic">{{variant}}</p>
              {{/if}}
              <p class="body-md font-medium text-fg">{{price}}</p>
            </div>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
