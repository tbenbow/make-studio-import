<section class="bg-base py-16 sm:py-24">
  <div class="mx-auto max-w-2xl px-6 lg:max-w-7xl lg:px-8">
    <div class="md:flex md:items-center md:justify-between">
      <h2 class="heading-sm text-fg">{{heading}}</h2>
      {{#if link-text}}
        <a href="{{link-url}}" class="hidden body-sm font-medium text-brand hover:text-brand/80 md:block">
          {{link-text}}
          <span aria-hidden="true"> →</span>
        </a>
      {{/if}}
    </div>
    <div class="mt-6 grid grid-cols-2 gap-x-4 gap-y-10 sm:gap-x-6 md:grid-cols-4 md:gap-y-0 lg:gap-x-8">
      {{#each products}}
        <div class="group relative">
          <div class="h-56 w-full overflow-hidden rounded-md bg-base-muted group-hover:opacity-75 lg:h-72 xl:h-80">
            {{#if image}}
              <img src="{{image}}" alt="{{name}}" class="size-full object-cover">
            {{/if}}
          </div>
          <h3 class="mt-4 body-sm text-fg-muted">
            <a href="{{link}}">
              <span class="absolute inset-0"></span>
              {{name}}
            </a>
          </h3>
          {{#if variant}}
            <p class="mt-1 body-sm text-fg-muted">{{variant}}</p>
          {{/if}}
          <p class="mt-1 body-sm font-medium text-fg">{{price}}</p>
        </div>
      {{/each}}
    </div>
    {{#if link-text}}
      <div class="mt-8 body-sm md:hidden">
        <a href="{{link-url}}" class="font-medium text-brand hover:text-brand/80">
          {{link-text}}
          <span aria-hidden="true"> →</span>
        </a>
      </div>
    {{/if}}
  </div>
</section>
