<section class="relative bg-base">
  <div class="mx-auto max-w-7xl lg:grid lg:grid-cols-12 lg:gap-x-8 lg:px-8">
    <div class="px-6 pb-24 pt-10 sm:pb-32 lg:col-span-7 lg:px-0 lg:pb-48 lg:pt-40 xl:col-span-6">
      <div class="mx-auto max-w-lg lg:mx-0">
        {{#if badge}}
          <div class="hidden sm:mt-32 sm:flex lg:mt-16">
            <div class="relative rounded-full px-3 py-1 body-sm text-fg-alt ring-1 ring-fg/10 hover:ring-fg/20">
              {{badge}}
            </div>
          </div>
        {{/if}}
        <h1 class="mt-24 text-pretty heading-xl text-fg sm:mt-10">{{headline}}</h1>
        {{#if subheadline}}
          <p class="mt-8 text-pretty body-lg text-fg-alt">{{subheadline}}</p>
        {{/if}}
        <div class="mt-10 flex items-center gap-4">
          {{#each buttons}}
            {{> Button}}
          {{/each}}
        </div>
      </div>
    </div>
    {{#if image}}
      <div class="relative lg:col-span-5 lg:-mr-8 xl:absolute xl:inset-0 xl:left-1/2 xl:mr-0">
        <img src="{{image}}" alt="" class="aspect-[3/2] w-full bg-base-alt object-cover lg:absolute lg:inset-0 lg:aspect-auto lg:h-full">
      </div>
    {{/if}}
  </div>
</section>
