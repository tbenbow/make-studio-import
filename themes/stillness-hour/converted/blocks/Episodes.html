<section class="py-20 lg:py-28 bg-base-muted">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-5xl lg:px-10 flex flex-col gap-12">
    <div class="text-center flex flex-col gap-2">
      {{#if eyebrow}}
        <p class="body-sm font-medium text-brand/70 tracking-[0.2em] uppercase">{{eyebrow}}</p>
      {{/if}}
      <h2 class="heading-lg text-fg">{{headline}}</h2>
    </div>
    {{#if (length episodes)}}
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {{#each episodes}}
          <div class="bg-panel/30 border border-border/8 rounded-xl p-6 hover:bg-panel/50 hover:border-brand/15 transition-all">
            <div class="flex items-start justify-between gap-3 mb-3">
              <h3 class="heading-sm text-fg">{{title}}</h3>
              <a href="{{default link '#'}}" class="w-9 h-9 rounded-full border border-brand/30 text-brand flex items-center justify-center shrink-0 hover:bg-brand hover:text-on-brand transition-all">
                {{icon "play" size="14"}}
              </a>
            </div>
            <p class="body-sm text-fg-alt">{{description}}</p>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
