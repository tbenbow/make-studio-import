<section class="py-20 lg:py-28 bg-base-muted">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-3xl lg:px-10 flex flex-col gap-6">
    {{#if eyebrow}}
      <p class="body-sm font-medium text-brand/70 tracking-[0.2em] uppercase">{{eyebrow}}</p>
    {{/if}}
    <div class="bg-panel/50 backdrop-blur-sm rounded-2xl p-8 sm:p-10 border border-border/10">
      <h2 class="heading-lg text-fg mb-3">{{headline}}</h2>
      <div class="body-md text-fg-muted mb-8">
        {{{description}}}
      </div>
      <div class="flex items-center gap-4">
        <a href="{{default play-link '#'}}" class="w-12 h-12 rounded-full bg-brand text-on-brand flex items-center justify-center hover:bg-brand-dim transition shrink-0">
          {{icon "play" size="20"}}
        </a>
        <div class="flex-1 space-y-2">
          <div class="h-1 bg-base-alt rounded-full overflow-hidden">
            <div class="h-full w-1/3 bg-brand/60 rounded-full"></div>
          </div>
          <div class="flex justify-between body-sm text-fg-alt">
            <span>{{default current-time "12:34"}}</span>
            <span>{{default duration "38:20"}}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
