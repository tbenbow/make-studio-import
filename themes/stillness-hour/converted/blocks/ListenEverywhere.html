<section class="py-20 lg:py-28 bg-base-muted">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-4xl lg:px-10 flex flex-col items-center gap-10 text-center">
    <div class="flex flex-col gap-3">
      <h2 class="heading-lg text-fg">{{headline}}</h2>
      {{#if subheadline}}
        <p class="body-md text-fg-alt">{{subheadline}}</p>
      {{/if}}
    </div>
    {{#if (length platforms)}}
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
        {{#each platforms}}
          <a href="{{url}}" class="bg-panel/30 border border-border/10 rounded-xl p-6 flex flex-col items-center gap-3 hover:bg-panel/50 hover:border-brand/20 transition-all group">
            {{#if icon}}
              <div class="text-fg-alt group-hover:text-brand transition">
                {{icon icon size="28"}}
              </div>
            {{/if}}
            <span class="body-sm text-fg-muted group-hover:text-fg transition">{{name}}</span>
          </a>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
