<section class="py-20 lg:py-28 bg-base-muted">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-5xl lg:px-10">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-12 items-center">
      <div class="lg:col-span-2">
        <div class="aspect-[3/4] rounded-2xl bg-panel overflow-hidden border border-border/10">
          <img src="{{portrait}}" alt="{{name}}" class="w-full h-full object-cover opacity-80">
        </div>
      </div>
      <div class="lg:col-span-3 flex flex-col gap-4">
        {{#if eyebrow}}
          <p class="body-sm font-medium text-brand/70 tracking-[0.2em] uppercase">{{eyebrow}}</p>
        {{/if}}
        <h2 class="heading-lg text-fg">{{headline}}</h2>
        <div class="body-md text-fg-muted leading-relaxed">
          {{{bio-intro}}}
        </div>
        <div class="body-md text-fg-alt leading-relaxed">
          {{{bio-detail}}}
        </div>
      </div>
    </div>
  </div>
</section>
