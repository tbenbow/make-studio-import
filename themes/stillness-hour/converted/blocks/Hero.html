<section class="relative py-32 lg:py-48 bg-base overflow-hidden">
  <div class="absolute inset-0" style="background: radial-gradient(ellipse at 50% 0%, rgba(212,165,116,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 50%, rgba(212,165,116,0.04) 0%, transparent 50%);"></div>
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10 flex flex-col items-center gap-6 relative z-10">
    {{#if eyebrow}}
      <p class="body-sm font-medium text-brand tracking-[0.25em] uppercase">{{eyebrow}}</p>
    {{/if}}
    <h1 class="heading-xl text-fg max-w-5xl text-center text-balance">{{headline}}</h1>
    <div class="body-lg text-fg-muted max-w-xl text-center">
      {{{subheadline}}}
    </div>
    <div class="body-md text-fg-alt max-w-xl text-center">
      {{{description}}}
    </div>
    {{#if (length buttons)}}
      <div class="flex flex-wrap items-center justify-center gap-4 mt-4">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    {{/if}}
    {{#if (length platform-links)}}
      <div class="flex items-center justify-center gap-6 mt-2 body-sm text-fg-alt">
        {{#each platform-links}}
          <a href="{{url}}" class="hover:text-brand transition">{{label}}</a>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
