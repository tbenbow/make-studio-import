<section class="py-16 lg:py-24 bg-base-alt">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-5xl lg:px-10 flex flex-col gap-10 sm:gap-16">
    <div class="text-center flex flex-col gap-4">
      <h2 class="heading-lg text-on-brand">{{headline}}</h2>
      {{#if subheadline}}
        <p class="body-lg text-fg-alt">{{subheadline}}</p>
      {{/if}}
    </div>
    {{#if (length steps)}}
      <div class="space-y-6">
        {{#each steps}}
          <div class="flex gap-6 items-start">
            <div class="flex-shrink-0 w-14 h-14 rounded-2xl bg-brand/20 flex items-center justify-center">
              <span class="text-brand font-bold body-lg">{{number}}</span>
            </div>
            <div class="pt-2">
              <h3 class="heading-sm text-on-brand mb-1">{{title}}</h3>
              <p class="body-md text-fg-alt">{{description}}</p>
            </div>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
