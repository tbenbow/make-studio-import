<section class="py-16 lg:py-24 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10 flex flex-col gap-10 sm:gap-16">
    <div class="flex max-w-2xl flex-col gap-4">
      <h2 class="heading-lg text-fg text-pretty">{{headline}}</h2>
      {{#if subheadline}}
        <div class="body-md text-fg-muted text-pretty">{{{subheadline}}}</div>
      {{/if}}
    </div>
    {{#if (length features)}}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
        {{#each features}}
          <div class="flex gap-5">
            {{#if icon}}
              <div class="flex-shrink-0 w-11 h-11 bg-teal-light rounded-xl flex items-center justify-center text-brand">
                {{icon icon size="20"}}
              </div>
            {{/if}}
            <div>
              <h3 class="heading-sm text-fg mb-2">{{headline}}</h3>
              <div class="body-md text-fg-muted">{{{description}}}</div>
            </div>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
