<section class="py-16 lg:py-24 bg-base">
  <div class="mx-auto w-full max-w-xl px-6 flex flex-col items-center gap-6 text-center">
    <h2 class="heading-lg text-fg">{{headline}}</h2>
    {{#if subheadline}}
      <div class="body-lg text-fg-muted">{{{subheadline}}}</div>
    {{/if}}
    {{#if (length buttons)}}
      <div class="flex flex-wrap items-center justify-center gap-4 mt-4">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
