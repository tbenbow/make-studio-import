<section class="py-16 lg:py-24 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-5xl lg:px-10 grid md:grid-cols-3 gap-8">
    <div class="md:col-span-1">
      <h2 class="heading-lg text-fg sticky top-28">{{headline}}</h2>
    </div>
    <div class="md:col-span-2 space-y-8">
      {{#each reasons}}
        <div class="border-l-2 border-brand pl-6">
          <h3 class="heading-sm text-fg mb-2">{{title}}</h3>
          <div class="body-md text-fg-muted">{{{description}}}</div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
