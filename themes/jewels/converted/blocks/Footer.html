<footer class="bg-base-alt text-border pt-12 lg:pt-16 pb-10 lg:pb-12 px-6 lg:px-24 border-t border-brand/10">
  <div class="mx-auto max-w-[1200px] grid grid-cols-1 lg:grid-cols-[1fr_auto_1fr] gap-8 lg:gap-16 items-start">
    <div>
      <p class="font-heading font-normal text-[1.1rem] tracking-[0.12em] uppercase text-base mb-4">{{brand-name}}</p>
      <p class="font-heading italic text-[0.9rem] text-border/60">{{tagline}}</p>
    </div>
    <div class="flex gap-12">
      <div>
        <h4 class="heading-xs uppercase text-gold-light mb-4">{{column-1-title}}</h4>
        <ul class="list-none space-y-2.5">
          {{#each column-1-links}}
            <li>
              <a href="{{link}}" class="text-border/70 no-underline body-md hover:text-base transition-colors">{{label}}</a>
            </li>
          {{/each}}
        </ul>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-gold-light mb-4">{{column-2-title}}</h4>
        <ul class="list-none space-y-2.5">
          {{#each column-2-links}}
            <li>
              <a href="{{link}}" class="text-border/70 no-underline body-md hover:text-base transition-colors">{{label}}</a>
            </li>
          {{/each}}
        </ul>
      </div>
    </div>
    <div class="flex lg:justify-end gap-6">
      {{#each social}}
        <a href="{{link}}" aria-label="{{label}}" class="w-9 h-9 border border-brand/20 rounded-full flex items-center justify-center text-border no-underline hover:border-brand hover:text-base transition-colors">
          {{icon icon size="16"}}
        </a>
      {{/each}}
    </div>
  </div>
  <p class="mx-auto max-w-[1200px] mt-10 lg:mt-12 pt-8 border-t border-brand/8 text-center text-xs opacity-40">{{copyright}}</p>
</footer>
