<section class="py-20 lg:py-28 bg-base text-fg">
  <div class="max-w-7xl mx-auto px-6">
    <h2 class="heading-lg uppercase mb-10">{{heading}}</h2>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
      <img src="{{photo}}" alt="{{name}}" class="w-full max-w-md object-cover" />
      <div>
        <h3 class="heading-md uppercase text-fg mb-1">{{name}}</h3>
        <p class="body-sm text-fg-muted italic mb-6">{{role}}</p>
        <div class="body-sm text-fg-muted space-y-4">{{{bio}}}</div>
      </div>
    </div>
  </div>
</section>
