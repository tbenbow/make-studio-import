<section class="bg-base-muted border-b border-border">
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-10 py-20 lg:py-28">
    <p class="body-sm uppercase tracking-[0.18em] text-brand font-medium mb-12">{{label}}</p>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20">
      <div>
        <h2 class="heading-md" style="font-family: 'Playfair Display', serif; line-height: 1.2;">{{headline}}</h2>
      </div>
      <div>
        <div class="body-md text-fg-muted space-y-6 leading-[1.9]">{{{body}}}</div>
      </div>
    </div>
  </div>
</section>
