<section class="bg-base border-b border-border">
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-10 py-20 lg:py-28">
    <p class="body-sm uppercase tracking-[0.18em] text-brand font-medium mb-12">{{label}}</p>
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_1.6fr] gap-12 lg:gap-24">
      <div>
        <h2 class="heading-lg">{{{headline}}}</h2>
        <div class="mt-10 flex gap-10">
          {{#each stats}}
            <div class="flex flex-col gap-1">
              <span class="heading-md text-fg">{{value}}</span>
              <span class="body-sm uppercase tracking-[0.1em] text-fg-muted">{{label}}</span>
            </div>
          {{/each}}
        </div>
      </div>
      <div>
        <div class="body-md text-fg-muted space-y-6 leading-[1.9]">{{{body}}}</div>
      </div>
    </div>
  </div>
</section>
