<section class="bg-base border-b border-border">
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-10 py-20 lg:py-28">
    <p class="body-sm uppercase tracking-[0.18em] text-brand font-medium mb-12">{{label}}</p>
    <div class="grid grid-cols-1 lg:grid-cols-3 border border-border">
      {{#each plans}}
        <div class="p-10 lg:p-12 border-b lg:border-b-0 {{#unless @last}}lg:border-r{{/unless}} border-border {{#if featured}}bg-base-alt text-on-brand{{/if}}">
          <span class="body-sm uppercase tracking-[0.18em] {{#if featured}}text-warm{{else}}text-brand{{/if}} font-medium block mb-6">{{tier}}</span>
          <p class="heading-sm mb-4" style="font-family: 'Playfair Display', serif; font-size: 1.6rem; line-height: 1.2;">{{name}}</p>
          <div class="heading-lg {{#if featured}}text-warm{{else}}text-brand{{/if}} mb-2" style="font-family: 'Playfair Display', serif;">{{price}}</div>
          <p class="body-sm text-fg-muted {{#if featured}}text-on-brand/55{{/if}} tracking-[0.06em] mb-8">{{unit}}</p>
          <p class="body-md {{#if featured}}text-on-brand/55{{else}}text-fg-muted{{/if}} leading-[1.8]">{{description}}</p>
          {{#if note}}
            <p class="mt-6 body-sm {{#if featured}}text-on-brand/55{{else}}text-fg-muted{{/if}} italic">{{note}}</p>
          {{/if}}
        </div>
      {{/each}}
    </div>
  </div>
</section>
