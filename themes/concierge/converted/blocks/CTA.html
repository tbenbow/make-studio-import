<section class="bg-base-alt text-center">
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-10 py-24 lg:py-32">
    <p class="body-sm uppercase tracking-[0.18em] text-warm font-medium mb-12">{{label}}</p>
    <h2 class="heading-lg text-on-brand max-w-[600px] mx-auto mb-6">{{headline}}</h2>
    <p class="body-md text-on-brand/60 max-w-[420px] mx-auto mb-12">{{subheadline}}</p>
    <div class="max-w-[480px] mx-auto text-left">
      <div class="flex flex-col gap-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block body-sm uppercase tracking-[0.12em] text-on-brand/50 mb-2">First name</label>
            <input type="text" placeholder="Jane" class="w-full bg-on-brand/[0.08] border border-on-brand/20 px-4 py-3 text-on-brand body-md outline-none">
          </div>
          <div>
            <label class="block body-sm uppercase tracking-[0.12em] text-on-brand/50 mb-2">Last name</label>
            <input type="text" placeholder="Smith" class="w-full bg-on-brand/[0.08] border border-on-brand/20 px-4 py-3 text-on-brand body-md outline-none">
          </div>
        </div>
        <div>
          <label class="block body-sm uppercase tracking-[0.12em] text-on-brand/50 mb-2">Email</label>
          <input type="email" placeholder="jane@yourbusiness.com" class="w-full bg-on-brand/[0.08] border border-on-brand/20 px-4 py-3 text-on-brand body-md outline-none">
        </div>
        <div>
          <label class="block body-sm uppercase tracking-[0.12em] text-on-brand/50 mb-2">What's your site for?</label>
          <textarea placeholder="Give us a quick sense of your business or project and what you need your site to do." rows="3" class="w-full bg-on-brand/[0.08] border border-on-brand/20 px-4 py-3 text-on-brand body-md outline-none resize-y"></textarea>
        </div>
        <div>
          <label class="block body-sm uppercase tracking-[0.12em] text-on-brand/50 mb-2">In-person or remote?</label>
          <select class="w-full bg-base-alt border border-on-brand/20 px-4 py-3 text-on-brand/70 body-md outline-none">
            <option value="">No preference, either works</option>
            <option value="in-person">In-person (Minneapolis area)</option>
            <option value="remote">Remote / video call</option>
          </select>
        </div>
        <div class="mt-2 flex justify-center">
          {{> Button link=cta-link label=cta-label style="outline" size="lg"}}
        </div>
        <p class="text-center body-sm text-on-brand/35 -mt-1">{{footnote}}</p>
      </div>
    </div>
  </div>
</section>
