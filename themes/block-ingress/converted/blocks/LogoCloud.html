<section class="bg-base py-16 lg:py-20">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">

    <p class="body-sm text-fg-alt text-center mb-10 uppercase tracking-widest font-medium">
      {{Heading}}
    </p>

    <div class="flex flex-wrap items-center justify-center gap-x-12 gap-y-8 opacity-60">
      {{#each Logos}}
      <img src="{{Logo}}" alt="{{Name}}" class="h-8 lg:h-10 w-auto object-contain grayscale" />
      {{/each}}
    </div>

  </div>
</section>
