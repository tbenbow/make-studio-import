<nav class="bg-base/80 backdrop-blur-md border-b border-border/50 sticky top-0 z-50" x-data="{ open: false }">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 lg:h-20">

      <!-- Logo -->
      <a href="{{[Logo Link]}}" class="heading-sm text-fg hover:text-brand transition-colors">
        {{[Logo Text]}}
      </a>

      <!-- Desktop Nav -->
      <div class="hidden lg:flex items-center gap-8">
        {{#each [Nav Links]}}
        <a href="{{URL}}" class="body-sm text-fg-muted hover:text-fg transition-colors">{{Label}}</a>
        {{/each}}
      </div>

      <!-- Desktop CTA -->
      <div class="hidden lg:block">
        {{> Button label=[CTA Label] style="primary" size="sm" link=[CTA Link]}}
      </div>

      <!-- Mobile Hamburger -->
      <button class="lg:hidden text-fg p-2" @click="open = !open">
        <svg x-show="!open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
        <svg x-show="open" x-cloak width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div x-show="open" x-cloak class="lg:hidden border-t border-border bg-base">
    <div class="max-w-7xl mx-auto px-6 py-4 space-y-3">
      {{#each [Nav Links]}}
      <a href="{{URL}}" class="block body-md text-fg-muted hover:text-fg py-2">{{Label}}</a>
      {{/each}}
      <div class="pt-3 border-t border-border">
        {{> Button label=[CTA Label] style="primary" size="md" link=[CTA Link]}}
      </div>
    </div>
  </div>
</nav>
