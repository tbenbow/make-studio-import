<section class="py-16 lg:py-24 bg-base relative z-10">
  <div class="mx-auto max-w-[1100px] px-6 lg:px-8">
    <div class="mb-12">
      <p class="heading-xs uppercase text-fg-muted tracking-[0.3em] mb-2 before:content-['//_'] before:text-fg-alt">{{label}}</p>
      <h2 class="heading-lg text-brand" style="text-shadow: 0 0 10px rgba(255,107,0,0.3);">{{headline}}</h2>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      {{#each items}}
        <div class="border border-border overflow-hidden hover:border-brand transition-colors group">
          <div class="h-[220px] relative overflow-hidden">
            <img src="{{image}}" alt="{{name}}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
            <div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px), linear-gradient(0deg, rgba(0,255,65,0.03) 1px, transparent 1px); background-size: 20px 20px;"></div>
          </div>
          <div class="p-6 flex justify-between items-end border-t border-border">
            <div>
              <div class="heading-sm text-brand tracking-[0.05em]">{{name}}</div>
              <div class="body-sm text-fg-muted mt-1">{{spec}}</div>
            </div>
            <span class="body-sm px-2.5 py-1 border uppercase tracking-[0.15em] {{#if building}}text-neon-yellow border-neon-yellow/30 shadow-[0_0_5px_rgba(255,229,0,0.2)]{{else}}text-fg border-fg-alt{{/if}}">
              {{status}}
            </span>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
