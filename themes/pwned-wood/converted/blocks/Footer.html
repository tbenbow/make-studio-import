<footer class="bg-base-muted border-t border-border pt-10 lg:pt-12 pb-6 px-6 lg:px-8 relative z-10">
  <div class="mx-auto max-w-[1100px]">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-[2fr_1fr_1fr_1fr] gap-8 lg:gap-12 pb-8 border-b border-border">
      <div>
        <span class="font-heading text-[0.9rem] font-black text-brand block mb-3">{{brand-name}}</span>
        <p class="body-sm text-fg-alt leading-[1.7] max-w-[280px]">{{brand-description}}</p>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-fg-muted tracking-[0.2em] mb-4 before:content-['$_'] before:text-fg-alt">{{col-1-title}}</h4>
        <ul class="list-none space-y-2">
          {{#each col-1-links}}
            <li><a href="{{link}}" class="no-underline text-fg-alt body-md hover:text-fg transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-fg-muted tracking-[0.2em] mb-4 before:content-['$_'] before:text-fg-alt">{{col-2-title}}</h4>
        <ul class="list-none space-y-2">
          {{#each col-2-links}}
            <li><a href="{{link}}" class="no-underline text-fg-alt body-md hover:text-fg transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-fg-muted tracking-[0.2em] mb-4 before:content-['$_'] before:text-fg-alt">{{col-3-title}}</h4>
        <ul class="list-none space-y-2">
          {{#each col-3-links}}
            <li><a href="{{link}}" class="no-underline text-fg-alt body-md hover:text-fg transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>
    </div>
    <div class="flex justify-between items-center pt-6 body-sm text-fg-alt">
      <span>{{copyright}}</span>
      <span class="text-brand/40">⚙ ━━━━━━ ⚡</span>
    </div>
  </div>
</footer>
