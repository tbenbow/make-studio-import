<section class="min-h-screen flex flex-col justify-center items-center text-center relative overflow-hidden" style="background: linear-gradient(170deg, #F5F0E8 0%, #FAF8F3 30%, #D6E8F0 60%, #DDD5CA 100%);">
  <div class="relative z-10">
    <p class="body-sm uppercase tracking-[0.25em] text-fg-alt font-normal mb-12">{{eyebrow}}</p>
    <h1 class="heading-xl text-fg mb-6">{{{headline}}}</h1>
    <div class="w-20 h-px mx-auto mb-8 relative overflow-hidden" style="background: linear-gradient(90deg, transparent, #7CA5B8, transparent);"></div>
    <p class="body-lg text-moss max-w-[500px] mx-auto">{{subtitle}}</p>
  </div>
</section>
