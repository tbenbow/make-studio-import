<footer class="bg-base-alt text-border pt-12 lg:pt-16 pb-8 px-6 lg:px-8">
  <div class="mx-auto max-w-[1100px]">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-[2fr_1fr_1fr_1fr] gap-8 lg:gap-12 pb-10 border-b border-border/10">
      <div>
        <span class="font-heading text-[1.3rem] font-medium tracking-[0.1em] text-base block mb-4">{{brand-name}}</span>
        <p class="body-md text-border leading-[1.7] max-w-[280px]">{{brand-description}}</p>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-base font-medium tracking-[0.2em] mb-5">{{col-1-title}}</h4>
        <ul class="list-none space-y-2.5">
          {{#each col-1-links}}
            <li><a href="{{link}}" class="no-underline text-border body-md hover:text-water-light transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-base font-medium tracking-[0.2em] mb-5">{{col-2-title}}</h4>
        <ul class="list-none space-y-2.5">
          {{#each col-2-links}}
            <li><a href="{{link}}" class="no-underline text-border body-md hover:text-water-light transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>
      <div>
        <h4 class="heading-xs uppercase text-base font-medium tracking-[0.2em] mb-5">{{col-3-title}}</h4>
        <ul class="list-none space-y-2.5">
          {{#each col-3-links}}
            <li><a href="{{link}}" class="no-underline text-border body-md hover:text-water-light transition-colors">{{label}}</a></li>
          {{/each}}
        </ul>
      </div>
    </div>
    <div class="flex justify-between items-center pt-6 body-sm text-border/50">
      <span>{{copyright}}</span>
      <span>{{tagline}}</span>
    </div>
  </div>
</footer>
