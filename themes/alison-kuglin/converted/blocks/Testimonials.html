<section class="py-20 lg:py-28" style="background: linear-gradient(180deg, #FAF8F3, #F5F0E8);">
  <div class="mx-auto max-w-[1100px] px-6 lg:px-8">
    <div class="text-center mb-16">
      <p class="heading-xs uppercase text-brand font-medium mb-4">{{label}}</p>
      <h2 class="heading-lg text-fg">{{headline}}</h2>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      {{#each items}}
        <div class="bg-panel p-10 rounded-sm relative shadow-[0_10px_40px_rgba(62,44,30,0.04)] hover:-translate-y-1 transition-transform">
          <span class="absolute top-4 left-6 font-heading text-[4rem] text-water-pale leading-none">&ldquo;</span>
          <blockquote class="font-heading italic text-[1.1rem] leading-[1.7] text-fg-muted mb-6 pt-4">
            {{quote}}
          </blockquote>
          <div class="body-sm uppercase tracking-[0.15em] text-fg-alt font-medium">
            {{author}}
            <span class="block font-light normal-case tracking-[0.05em] text-border mt-1 text-[0.7rem]">{{location}}</span>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
