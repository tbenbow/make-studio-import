<section class="py-20 lg:py-28 relative overflow-hidden" style="background: linear-gradient(180deg, #F5F0E8 0%, #FAF8F3 100%);">
  <div class="absolute top-0 left-0 right-0 h-px" style="background: linear-gradient(90deg, transparent, #C4B8A8, transparent);"></div>
  <div class="mx-auto max-w-[1100px] px-6 lg:px-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
      <div>
        <p class="heading-xs uppercase text-brand font-medium mb-4">{{label}}</p>
        <h2 class="heading-lg text-fg mb-8">{{{headline}}}</h2>
        <div class="body-md text-fg-muted max-w-[480px] space-y-6">
          {{{description}}}
        </div>
      </div>
      <div class="flex flex-col gap-6">
        {{#each cards}}
          <div class="bg-panel p-8 rounded-sm shadow-[0_20px_60px_rgba(62,44,30,0.08)] hover:-translate-y-1 transition-transform">
            <div class="w-10 h-10 rounded-full flex items-center justify-center mb-4 bg-water-pale text-[1.1rem]">{{icon}}</div>
            <h4 class="heading-md text-fg mb-2">{{title}}</h4>
            <p class="body-md text-fg-alt leading-relaxed">{{description}}</p>
          </div>
        {{/each}}
      </div>
    </div>
  </div>
</section>
