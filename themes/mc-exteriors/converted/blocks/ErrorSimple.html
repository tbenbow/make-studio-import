<section class="grid min-h-full place-items-center bg-base px-6 py-24 sm:py-32 lg:px-8">
  <div class="text-center">
    <p class="body-md font-semibold text-brand">{{code}}</p>
    <h1 class="mt-4 heading-xl text-balance text-fg">{{heading}}</h1>
    {{#if description}}
      <p class="mt-6 body-lg font-medium text-pretty text-fg-muted">{{description}}</p>
    {{/if}}
    <div class="mt-10 flex items-center justify-center gap-x-6">
      {{#each buttons}}
        {{> Button}}
      {{/each}}
    </div>
  </div>
</section>
