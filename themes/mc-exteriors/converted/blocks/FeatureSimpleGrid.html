<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:mx-0">
      <h2 class="heading-lg text-fg">{{headline}}</h2>
      {{#if description}}
        <p class="mt-6 body-md text-fg-alt">{{description}}</p>
      {{/if}}
    </div>
    <dl class="mx-auto mt-16 grid max-w-2xl grid-cols-1 gap-x-8 gap-y-16 body-md sm:grid-cols-2 lg:mx-0 lg:max-w-none lg:grid-cols-3">
      {{#each features}}
        <div>
          <dt class="font-semibold text-fg">{{title}}</dt>
          <dd class="mt-1 text-fg-muted">{{description}}</dd>
        </div>
      {{/each}}
    </dl>
  </div>
</section>
