<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl sm:text-center">
      {{#if eyebrow}}
        <h2 class="body-sm font-semibold text-brand">{{eyebrow}}</h2>
      {{/if}}
      <p class="mt-2 heading-lg text-fg">{{headline}}</p>
      {{#if description}}
        <p class="mt-6 body-md text-fg-alt">{{description}}</p>
      {{/if}}
    </div>
  </div>
  {{#if screenshot}}
    <div class="relative overflow-hidden pt-16">
      <div class="mx-auto max-w-7xl px-6 lg:px-8">
        <img src="{{screenshot}}" alt="App screenshot" class="mb-[-12%] rounded-xl shadow-2xl ring-1 ring-fg/10">
        <div aria-hidden="true" class="relative">
          <div class="absolute -inset-x-20 bottom-0 bg-gradient-to-t from-base pt-[7%]"></div>
        </div>
      </div>
    </div>
  {{/if}}
  <div class="mx-auto mt-16 max-w-7xl px-6 sm:mt-20 md:mt-24 lg:px-8">
    <dl class="mx-auto grid max-w-2xl grid-cols-1 gap-x-6 gap-y-10 body-md text-fg-muted sm:grid-cols-2 lg:mx-0 lg:max-w-none lg:grid-cols-3 lg:gap-x-8 lg:gap-y-16">
      {{#each features}}
        <div class="relative pl-9">
          <dt class="inline font-semibold text-fg">
            {{#if icon}}
              <div class="absolute top-1 left-1 size-5 text-brand">
                {{icon icon size="20"}}
              </div>
            {{/if}}
            {{title}}.
          </dt>
          <dd class="inline">{{description}}</dd>
        </div>
      {{/each}}
    </dl>
  </div>
</section>
