<section class="bg-base pt-24 pb-16 sm:pt-32 sm:pb-24 xl:pb-32">
  <div class="bg-panel pb-20 border border-border sm:pb-24 xl:pb-0">
    <div class="mx-auto flex max-w-7xl flex-col items-center gap-x-8 gap-y-10 px-6 sm:gap-y-8 lg:px-8 xl:flex-row xl:items-stretch">
      <div class="-mt-8 w-full max-w-2xl xl:-mb-8 xl:w-96 xl:flex-none">
        <div class="relative aspect-2/1 h-full md:-mx-8 xl:mx-0 xl:aspect-auto">
          {{#if image}}
            <img src="{{image}}" alt="" class="absolute inset-0 size-full rounded-2xl object-cover">
          {{/if}}
        </div>
      </div>
      <div class="w-full max-w-2xl xl:max-w-none xl:flex-auto xl:px-16 xl:py-24">
        <figure class="relative isolate pt-6 sm:pt-12">
          <blockquote class="text-xl/8 font-semibold text-fg sm:text-2xl/9">
            <p>{{quote}}</p>
          </blockquote>
          <figcaption class="mt-8 body-md">
            <div class="font-semibold text-fg">{{name}}</div>
            <div class="mt-1 text-fg-muted">{{role}}</div>
          </figcaption>
        </figure>
      </div>
    </div>
  </div>
</section>
