<section class="bg-base">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8 lg:py-40">
    <h2 class="heading-lg text-fg">{{heading}}</h2>
    <dl class="mt-20 divide-y divide-border">
      {{#each faqs}}
        <div class="py-8 first:pt-0 last:pb-0 lg:grid lg:grid-cols-12 lg:gap-8">
          <dt class="body-md font-semibold text-fg lg:col-span-5">{{question}}</dt>
          <dd class="mt-4 lg:col-span-7 lg:mt-0">
            <p class="body-md text-fg-muted">{{answer}}</p>
          </dd>
        </div>
      {{/each}}
    </dl>
  </div>
</section>
