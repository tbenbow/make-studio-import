<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:max-w-none">
      <div class="text-center">
        <h2 class="heading-lg text-balance text-fg">{{heading}}</h2>
        {{#if description}}
          <p class="mt-4 body-lg text-fg-muted">{{description}}</p>
        {{/if}}
      </div>
      <dl class="mt-16 grid grid-cols-1 gap-0.5 overflow-hidden rounded-2xl text-center sm:grid-cols-2 lg:grid-cols-4">
        {{#each stats}}
          <div class="flex flex-col bg-panel p-8">
            <dt class="body-sm font-semibold text-fg-muted">{{label}}</dt>
            <dd class="order-first heading-md tracking-tight text-fg">{{value}}</dd>
          </div>
        {{/each}}
      </dl>
    </div>
  </div>
</section>
