<header class="sticky top-0 z-10 bg-base-alt">
  <nav>
    <div class="mx-auto flex h-16 max-w-7xl items-center gap-4 px-6 lg:px-10">
      <div class="flex flex-1 items-center">
        <a href="{{default logo_link '/'}}" class="inline-flex items-center gap-1 heading-sm text-on-brand">
          {{default logo_text 'MC'}} <span class="text-brand">{{default logo_accent 'EXTERIORS'}}</span>
        </a>
      </div>
      {{#if (length links)}}
        <div class="hidden lg:flex gap-8">
          {{#each links}}
            <a href="{{url}}" class="body-sm font-medium text-on-brand/70 hover:text-on-brand transition {{#if (isActive url)}}text-brand{{/if}}">
              {{label}}
            </a>
          {{/each}}
        </div>
      {{/if}}
      <div class="flex flex-1 items-center justify-end gap-4">
        {{#if phone}}
          <a href="tel:{{phone}}" class="hidden sm:inline body-sm text-on-brand/70 hover:text-on-brand transition">{{phone}}</a>
        {{/if}}
        {{#if cta_label}}
          {{> Button link=cta_link label=cta_label style="primary" size="sm"}}
        {{/if}}
        <button type="button" aria-label="Toggle menu" class="inline-flex rounded-full p-1.5 text-on-brand hover:bg-on-brand/10 lg:hidden">
          {{icon "list" size="24"}}
        </button>
      </div>
    </div>
  </nav>
</header>
