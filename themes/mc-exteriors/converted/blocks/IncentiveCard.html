<section class="bg-base">
  <div class="mx-auto max-w-7xl px-4 py-24 sm:px-6 lg:px-8">
    <div class="rounded-2xl bg-panel px-6 py-16 sm:p-16">
      <div class="mx-auto max-w-xl lg:max-w-none">
        <div class="text-center">
          <h2 class="heading-sm text-fg">{{headline}}</h2>
        </div>
        <div class="mx-auto mt-12 grid max-w-sm grid-cols-1 gap-x-8 gap-y-10 sm:max-w-none lg:grid-cols-3">
          {{#each perks}}
            <div class="text-center sm:flex sm:text-left lg:block lg:text-center">
              {{#if icon}}
                <div class="sm:shrink-0">
                  <div class="flow-root">
                    <div class="mx-auto size-16 text-brand">
                      {{icon icon size="64"}}
                    </div>
                  </div>
                </div>
              {{/if}}
              <div class="mt-3 sm:mt-0 sm:ml-6 lg:mt-6 lg:ml-0">
                <h3 class="body-sm font-medium text-fg">{{title}}</h3>
                <p class="mt-2 body-sm text-fg-muted">{{description}}</p>
              </div>
            </div>
          {{/each}}
        </div>
      </div>
    </div>
  </div>
</section>
