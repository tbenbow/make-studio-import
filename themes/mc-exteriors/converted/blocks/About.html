<section class="py-20 lg:py-24 bg-base-alt">
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-10">
    <div class="grid lg:grid-cols-2 gap-16 items-center">
      <div class="flex flex-col gap-6">
        {{#if eyebrow}}
          <p class="body-sm font-semibold text-brand uppercase tracking-wider">{{eyebrow}}</p>
        {{/if}}
        <h2 class="heading-lg text-on-brand text-pretty">{{headline}}</h2>
        <div class="body-lg text-on-brand/60">{{{description}}}</div>
        {{#if (length stats)}}
          <div class="grid grid-cols-3 gap-6 mt-2">
            {{#each stats}}
              <div class="border-l-2 border-brand pl-4">
                <p class="heading-md text-on-brand">{{stat}}</p>
                <p class="body-sm text-on-brand/50">{{text}}</p>
              </div>
            {{/each}}
          </div>
        {{/if}}
      </div>
      <div class="rounded-2xl overflow-hidden border border-on-brand/10">
        <img src="{{image}}" alt="{{headline}}" class="w-full" />
      </div>
    </div>
  </div>
</section>
