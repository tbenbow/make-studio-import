<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl lg:mx-0">
      <h2 class="heading-lg text-pretty text-fg">{{heading}}</h2>
      {{#if description}}
        <p class="mt-6 body-lg text-fg-muted">{{description}}</p>
      {{/if}}
    </div>
    <ul role="list" class="mx-auto mt-20 grid max-w-2xl grid-cols-2 gap-x-8 gap-y-16 text-center sm:grid-cols-3 md:grid-cols-4 lg:mx-0 lg:max-w-none lg:grid-cols-5 xl:grid-cols-6">
      {{#each members}}
        <li>
          {{#if avatar}}
            <img src="{{avatar}}" alt="{{name}}" class="mx-auto size-24 rounded-full">
          {{/if}}
          <h3 class="mt-6 body-md font-semibold tracking-tight text-fg">{{name}}</h3>
          <p class="body-sm text-fg-muted">{{role}}</p>
        </li>
      {{/each}}
    </ul>
  </div>
</section>
