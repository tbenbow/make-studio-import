<section class="bg-base">
  <div class="grid min-h-full grid-cols-1 grid-rows-[1fr_auto_1fr] lg:grid-cols-[max(50%,36rem)_1fr]">
    <main class="mx-auto w-full max-w-7xl px-6 py-24 sm:py-32 lg:col-span-2 lg:col-start-1 lg:row-start-2 lg:px-8">
      <div class="max-w-lg">
        <p class="body-md font-semibold text-brand">{{code}}</p>
        <h1 class="mt-4 heading-xl text-pretty text-fg">{{heading}}</h1>
        {{#if description}}
          <p class="mt-6 body-lg font-medium text-pretty text-fg-muted">{{description}}</p>
        {{/if}}
        {{#if link-text}}
          <div class="mt-10">
            <a href="{{link-url}}" class="body-sm font-semibold text-brand"><span aria-hidden="true">←</span> {{link-text}}</a>
          </div>
        {{/if}}
      </div>
    </main>
    <div class="hidden lg:relative lg:col-start-2 lg:row-start-1 lg:row-end-4 lg:block">
      <img src="{{image}}" alt="" class="absolute inset-0 size-full object-cover">
    </div>
  </div>
</section>
