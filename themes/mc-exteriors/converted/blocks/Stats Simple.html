<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <dl class="grid grid-cols-1 gap-x-8 gap-y-16 text-center lg:grid-cols-3">
      {{#each stats}}
        <div class="mx-auto flex max-w-xs flex-col gap-y-4">
          <dt class="body-md text-fg-muted">{{label}}</dt>
          <dd class="order-first heading-lg tracking-tight text-fg">{{value}}</dd>
        </div>
      {{/each}}
    </dl>
  </div>
</section>
