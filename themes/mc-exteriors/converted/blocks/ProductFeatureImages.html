<section class="bg-base-alt py-24 sm:py-32">
  <div class="mx-auto max-w-2xl px-4 sm:px-6 lg:max-w-7xl lg:px-8">
    <div class="flex flex-col items-center text-center">
      <h2 class="heading-lg text-fg">{{heading}}</h2>
      {{#if description}}
        <p class="mt-3 max-w-3xl body-lg text-fg-muted">{{description}}</p>
      {{/if}}
    </div>
    <div class="mt-16 grid grid-cols-1 gap-y-16 lg:grid-cols-2 lg:gap-x-8">
      {{#each features}}
        <div>
          {{#if image}}
            <img src="{{image}}" alt="{{title}}" class="aspect-3/2 w-full rounded-lg object-cover">
          {{/if}}
          <p class="mt-8 body-md text-fg-muted">{{description}}</p>
        </div>
      {{/each}}
    </div>
  </div>
</section>
