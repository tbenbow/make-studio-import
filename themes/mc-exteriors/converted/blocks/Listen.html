<div class="divide-y divide-slate-100 sm:mt-4 lg:mt-8 lg:border-t lg:border-slate-100">
  {{#each episodes}}
    <article aria-labelledby="episode-{{id}}-title" class="py-10 sm:py-12">
      <div class="lg:px-8">
        <div class="lg:max-w-4xl">
          <div class="mx-auto px-4 sm:px-6 md:max-w-2xl md:px-4 lg:px-0">
            <div class="flex flex-col items-start">
              <h2 id="episode-{{id}}-title" class="mt-2 text-lg font-bold text-slate-900"><a href="{{default episode-link '#'}}">{{default title 'Episode title'}}</a></h2><time datetime="{{default date-time ''}}" class="order-first font-mono text-sm/7 text-slate-500">{{default
                date-label 'Date'}}</time>
              <p class="mt-1 text-base/7 text-slate-700">{{default description 'Episode description'}}</p>
              <div class="mt-4 flex items-center gap-4">
                {{> Button label='Listen' link=listen-link style=primary size=sm}}
                <span aria-hidden="true" class="text-sm font-bold text-slate-400">/</span>
                <a class="flex items-center text-sm/6 font-bold text-pink-500 hover:text-pink-700 active:text-pink-900" aria-label="{{default notes-aria-label 'Show notes'}}" href="{{default notes-link '#'}}">
                    {{default
                  notes-label 'Show notes'}}</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </article>
  {{/each}}
</div>
