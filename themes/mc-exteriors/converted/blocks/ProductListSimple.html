<section class="bg-base py-16 sm:py-24">
  <div class="mx-auto max-w-2xl px-6 lg:max-w-7xl lg:px-8">
    {{#if heading}}
      <h2 class="heading-sm text-fg">{{heading}}</h2>
    {{/if}}
    <div class="mt-6 grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4 xl:gap-x-8">
      {{#each products}}
        <div class="group relative">
          {{#if image}}
            <img src="{{image}}" alt="{{name}}" class="aspect-square w-full rounded-md bg-base-muted object-cover group-hover:opacity-75 lg:aspect-auto lg:h-80">
          {{/if}}
          <div class="mt-4 flex justify-between">
            <div>
              <h3 class="body-sm text-fg-muted">
                <a href="{{link}}">
                  <span aria-hidden="true" class="absolute inset-0"></span>
                  {{name}}
                </a>
              </h3>
              {{#if variant}}
                <p class="mt-1 body-sm text-fg-muted">{{variant}}</p>
              {{/if}}
            </div>
            <p class="body-sm font-medium text-fg">{{price}}</p>
          </div>
        </div>
      {{/each}}
    </div>
  </div>
</section>
