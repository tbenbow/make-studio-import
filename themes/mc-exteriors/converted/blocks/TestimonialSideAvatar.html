<section class="isolate overflow-hidden bg-base px-6 lg:px-8">
  <div class="relative mx-auto max-w-2xl py-24 sm:py-32 lg:max-w-4xl">
    <figure class="grid grid-cols-1 items-center gap-x-6 gap-y-8 lg:gap-x-10">
      <div class="relative col-span-2 lg:col-start-1 lg:row-start-2">
        <blockquote class="text-xl/8 font-semibold text-fg sm:text-2xl/9">
          <p>{{quote}}</p>
        </blockquote>
      </div>
      <div class="col-end-1 w-16 lg:row-span-4 lg:w-72">
        {{#if avatar}}
          <img src="{{avatar}}" alt="{{name}}" class="rounded-xl lg:rounded-3xl">
        {{/if}}
      </div>
      <figcaption class="body-md lg:col-start-1 lg:row-start-3">
        <div class="font-semibold text-fg">{{name}}</div>
        <div class="mt-1 text-fg-muted">{{role}}</div>
      </figcaption>
    </figure>
  </div>
</section>
