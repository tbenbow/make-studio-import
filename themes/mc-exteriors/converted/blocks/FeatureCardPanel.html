<section class="bg-base py-24">
  <div class="mx-auto max-w-7xl sm:px-6 lg:px-8">
    <div class="relative isolate overflow-hidden bg-panel px-6 py-20 ring-1 ring-fg/10 sm:rounded-3xl sm:px-10 sm:py-24 xl:px-24">
      <div class="mx-auto grid max-w-2xl grid-cols-1 gap-x-8 gap-y-16 sm:gap-y-20 lg:mx-0 lg:max-w-none lg:grid-cols-2 lg:items-center lg:gap-y-0">
        <div class="lg:row-start-2 lg:max-w-md">
          <h2 class="heading-md text-fg">{{headline}}</h2>
          {{#if description}}
            <p class="mt-6 body-md text-fg-alt">{{description}}</p>
          {{/if}}
        </div>
        {{#if screenshot}}
          <img src="{{screenshot}}" alt="Product screenshot" class="relative -z-20 max-w-xl min-w-full rounded-xl shadow-xl ring-1 ring-fg/10 lg:row-span-4 lg:w-[64rem] lg:max-w-none">
        {{/if}}
        <div class="max-w-xl lg:row-start-3 lg:mt-10 lg:max-w-md lg:border-t lg:border-fg/10 lg:pt-10">
          <dl class="max-w-xl space-y-8 body-md text-fg-alt lg:max-w-none">
            {{#each features}}
              <div class="relative">
                <dt class="ml-9 inline-block font-semibold text-fg">
                  {{#if icon}}
                    <div class="absolute top-1 left-1 size-5 text-brand">
                      {{icon icon size="20"}}
                    </div>
                  {{/if}}
                  {{title}}.
                </dt>
                <dd class="inline">{{description}}</dd>
              </div>
            {{/each}}
          </dl>
        </div>
      </div>
    </div>
  </div>
</section>
