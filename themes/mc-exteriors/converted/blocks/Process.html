<section class="py-20 lg:py-24 bg-base">
  <div class="mx-auto w-full max-w-7xl px-6 lg:px-10 flex flex-col gap-10 sm:gap-16">
    <div class="flex flex-col items-center gap-2 text-center">
      {{#if eyebrow}}
        <p class="body-sm font-semibold text-brand uppercase tracking-wider">{{eyebrow}}</p>
      {{/if}}
      <h2 class="heading-lg text-fg text-pretty">{{headline}}</h2>
    </div>
    {{#if (length steps)}}
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        {{#each steps}}
          <div class="relative bg-base-muted rounded-xl p-8 border-t-4 border-brand">
            <div class="heading-lg font-bold text-brand/10 absolute top-4 right-6">{{number}}</div>
            <h3 class="heading-sm text-fg mb-3 mt-4">{{headline}}</h3>
            <div class="body-md text-fg-muted">{{{description}}}</div>
          </div>
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
