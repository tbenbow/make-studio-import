<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto grid max-w-2xl grid-cols-1 gap-8 overflow-hidden lg:mx-0 lg:max-w-none lg:grid-cols-4">
      {{#each milestones}}
        <div>
          <time class="flex items-center body-sm font-semibold text-brand">
            <svg viewBox="0 0 4 4" aria-hidden="true" class="mr-4 size-1 flex-none">
              <circle r="2" cx="2" cy="2" fill="currentColor"></circle>
            </svg>
            {{date}}
            <div aria-hidden="true" class="absolute -ml-2 h-px w-screen -translate-x-full bg-border sm:-ml-4 lg:static lg:-mr-6 lg:ml-8 lg:w-auto lg:flex-auto lg:translate-x-0"></div>
          </time>
          <p class="mt-6 body-lg font-semibold tracking-tight text-fg">{{title}}</p>
          <p class="mt-1 body-md text-fg-muted">{{description}}</p>
        </div>
      {{/each}}
    </div>
  </div>
</section>
