<section class="bg-base">
  <div class="mx-auto max-w-7xl px-6 py-24 sm:pt-32 lg:px-8 lg:py-40">
    <div class="lg:grid lg:grid-cols-12 lg:gap-8">
      <div class="lg:col-span-5">
        <h2 class="heading-lg text-pretty text-fg">{{heading}}</h2>
        {{#if support-text}}
          <p class="mt-4 body-md text-pretty text-fg-muted">{{{support-text}}}</p>
        {{/if}}
      </div>
      <div class="mt-10 lg:col-span-7 lg:mt-0">
        <dl class="space-y-10">
          {{#each faqs}}
            <div>
              <dt class="body-md font-semibold text-fg">{{question}}</dt>
              <dd class="mt-2 body-md text-fg-muted">{{answer}}</dd>
            </div>
          {{/each}}
        </dl>
      </div>
    </div>
  </div>
</section>
