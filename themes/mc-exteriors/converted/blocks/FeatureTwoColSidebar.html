<section class="bg-base py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto grid max-w-2xl grid-cols-1 gap-16 sm:gap-y-20 lg:mx-0 lg:max-w-none lg:grid-cols-5">
      <h2 class="col-span-2 heading-lg text-fg">{{headline}}</h2>
      <dl class="col-span-3 grid grid-cols-1 gap-x-8 gap-y-16 sm:grid-cols-2">
        {{#each features}}
          <div>
            <dt class="body-md font-semibold text-fg">
              {{#if icon}}
                <div class="mb-6 flex size-10 items-center justify-center rounded-lg bg-brand text-on-brand">
                  {{icon icon size="24"}}
                </div>
              {{/if}}
              {{title}}
            </dt>
            <dd class="mt-1 body-md text-fg-muted">{{description}}</dd>
          </div>
        {{/each}}
      </dl>
    </div>
  </div>
</section>
