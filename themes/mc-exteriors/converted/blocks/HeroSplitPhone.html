<section class="relative isolate overflow-hidden bg-base">
  <svg aria-hidden="true" class="absolute inset-0 -z-10 size-full stroke-fg/10 [mask-image:radial-gradient(100%_100%_at_top_right,white,transparent)]">
    <defs>
      <pattern id="hero-grid" width="200" height="200" x="50%" y="-1" patternUnits="userSpaceOnUse">
        <path d="M100 200V.5M.5 .5H200" fill="none"></path>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hero-grid)" stroke-width="0"></rect>
  </svg>
  <div class="mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:flex lg:items-center lg:gap-x-10 lg:px-8 lg:py-40">
    <div class="mx-auto max-w-2xl lg:mx-0 lg:flex-auto">
      {{#if badge-label}}
        <div class="flex">
          <div class="relative flex items-center gap-x-4 rounded-full bg-fg/5 px-4 py-1 body-sm text-fg-alt ring-1 ring-fg/10 hover:ring-fg/20">
            <span class="font-semibold text-brand">{{badge-label}}</span>
            <span aria-hidden="true" class="h-4 w-px bg-fg/10"></span>
            <a href="{{badge-link}}" class="flex items-center gap-x-1">
              <span aria-hidden="true" class="absolute inset-0"></span>
              {{badge-link-text}}
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" class="-mr-2 size-5 text-fg-muted">
                <path d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" fill-rule="evenodd"></path>
              </svg>
            </a>
          </div>
        </div>
      {{/if}}
      <h1 class="mt-10 text-pretty heading-xl text-fg">{{headline}}</h1>
      {{#if subheadline}}
        <p class="mt-8 text-pretty body-lg text-fg-alt">{{subheadline}}</p>
      {{/if}}
      <div class="mt-10 flex items-center gap-4">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    </div>
    {{#if phone-screenshot}}
      <div class="mt-16 sm:mt-24 lg:mt-0 lg:shrink-0 lg:grow">
        <svg role="img" viewBox="0 0 366 729" class="mx-auto w-[22.875rem] max-w-full drop-shadow-xl">
          <title>App screenshot</title>
          <defs>
            <clipPath id="phone-clip">
              <rect width="316" height="684" rx="36"></rect>
            </clipPath>
          </defs>
          <path d="M363.315 64.213C363.315 22.99 341.312 1 300.092 1H66.751C25.53 1 3.528 22.99 3.528 64.213v44.68l-.857.143A2 2 0 0 0 1 111.009v24.611a2 2 0 0 0 1.671 1.973l.95.158a2.26 2.26 0 0 1-.093.236v26.173c.212.1.398.296.541.643l-1.398.233A2 2 0 0 0 1 167.009v47.611a2 2 0 0 0 1.671 1.973l1.368.228c-.139.319-.314.533-.511.653v16.637c.221.104.414.313.56.689l-1.417.236A2 2 0 0 0 1 237.009v47.611a2 2 0 0 0 1.671 1.973l1.347.225c-.135.294-.302.493-.49.607v377.681c0 41.213 22 63.208 63.223 63.208h95.074c.947-.504 2.717-.843 4.745-.843l.141.001h.194l.086-.001 33.704.005c1.849.043 3.442.37 4.323.838h95.074c41.222 0 63.223-21.999 63.223-63.212v-394.63c-.259-.275-.48-.796-.63-1.47l-.011-.133 1.655-.276A2 2 0 0 0 366 266.62v-77.611a2 2 0 0 0-1.671-1.973l-1.712-.285c.148-.839.396-1.491.698-1.811V64.213Z" fill="#4B5563"></path>
          <path d="M16 59c0-23.748 19.252-43 43-43h246c23.748 0 43 19.252 43 43v615c0 23.196-18.804 42-42 42H58c-23.196 0-42-18.804-42-42V59Z" fill="#343E4E"></path>
          
        </svg>
      </div>
    {{/if}}
  </div>
</section>
