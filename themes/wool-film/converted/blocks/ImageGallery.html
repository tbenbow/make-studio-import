<section class="py-16 lg:py-24 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10">
    <div class="grid grid-cols-2 lg:grid-cols-3 gap-4">
      {{#each images}}
        <div class="aspect-video overflow-hidden">
          <img src="{{src}}" alt="{{default alt 'Film still'}}" class="h-full w-full object-cover hover:scale-105 transition duration-500">
        </div>
      {{/each}}
    </div>
  </div>
</section>
