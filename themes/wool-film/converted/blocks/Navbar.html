<header class="sticky top-0 z-10" style="background-color: transparent;">
  <nav>
    <div class="mx-auto flex h-20 max-w-7xl items-center gap-4 px-6 lg:px-10">
      <div class="flex flex-1 items-center">
        <a href="{{default logo-link '/'}}" class="inline-flex items-center gap-2">
          {{#if logo}}
            <img src="{{logo}}" alt="{{default logo-text 'WOOL'}}" class="h-8 w-auto">
          {{else}}
            <span class="heading-md text-brand font-bold tracking-tight">{{default logo-text "WOOL"}}</span>
          {{/if}}
        </a>
      </div>
      <div class="hidden lg:flex gap-8">
        {{#each links}}
          <a href="{{url}}" class="heading-sm text-fg uppercase hover:text-brand transition">
            {{label}}
          </a>
        {{/each}}
      </div>
      <div class="flex flex-1 items-center justify-end">
        <button type="button" aria-label="Toggle menu" class="inline-flex rounded-full p-1.5 text-fg hover:bg-base-muted lg:hidden">
          {{icon "list" size="24"}}
        </button>
      </div>
    </div>
  </nav>
</header>
