<section class="py-20 sm:py-28 bg-base">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10">
    <div class="text-center mb-12">
      <h2 class="heading-lg text-base-alt mb-4">{{default headline "THE CAPTAIN'S GALLEY"}}</h2>
      {{#if subtitle}}
        <p class="body-lg text-fg-muted">{{subtitle}}</p>
      {{/if}}
    </div>

    <div class="max-w-5xl mx-auto">
      <div class="rounded-3xl overflow-hidden shadow-2xl mb-10">
        <img src="{{image}}" alt="{{headline}}" class="w-full h-auto" />
      </div>

      {{#if body}}
        <div class="text-center max-w-2xl mx-auto">
          <div class="body-lg text-fg-muted leading-relaxed mb-10">
            {{{body}}}
          </div>
        </div>
      {{/if}}

      {{#if (length stats)}}
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-6 mb-10">
          {{#each stats}}
            <div class="{{#if @odd}}bg-[--custom-sunset]{{else}}bg-brand{{/if}} text-on-brand rounded-2xl p-6 shadow-lg text-center">
              <p class="heading-md mb-1">{{value}}</p>
              <p class="body-sm text-on-brand/80">{{label}}</p>
            </div>
          {{/each}}
        </div>
      {{/if}}

      {{#if cta-label}}
        <div class="text-center">
          {{> Button link=cta-link label=cta-label style="secondary" size="lg"}}
        </div>
      {{/if}}
    </div>
  </div>
</section>
