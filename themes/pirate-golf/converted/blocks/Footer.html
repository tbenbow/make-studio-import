<footer class="bg-fg py-8">
  <div class="mx-auto w-full max-w-2xl px-6 md:max-w-3xl lg:max-w-7xl lg:px-10 flex flex-col sm:flex-row items-center justify-between gap-4">
    <a href="{{default logo-link '/'}}" class="heading-sm text-[--custom-treasure]">
      {{default logo-text "Buccaneer's Bluff"}}
    </a>
    {{#if (length links)}}
      <div class="flex gap-6">
        {{#each links}}
          <a href="{{default link '#'}}" class="body-sm text-fg-alt hover:text-[--custom-treasure]">
            {{label}}
          </a>
        {{/each}}
      </div>
    {{/if}}
    {{#if copyright}}
      <p class="body-sm text-fg-muted">{{copyright}}</p>
    {{/if}}
  </div>
</footer>
