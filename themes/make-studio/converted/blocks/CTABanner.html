<section class="py-20 lg:py-32 bg-fg">
  <div class="mx-auto w-full max-w-7xl px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="heading-xl text-on-brand mb-8" style="font-style: italic;">{{default headline 'Start building blocks.'}}</h2>
    {{#if subheadline}}
      <div class="body-lg text-on-brand/60 max-w-md mx-auto mb-10">{{{subheadline}}}</div>
    {{/if}}
    {{#if (length buttons)}}
      <div class="flex flex-wrap items-center justify-center gap-4">
        {{#each buttons}}
          {{> Button}}
        {{/each}}
      </div>
    {{/if}}
  </div>
</section>
